<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zippee · Location Master</title>
<style>
  :root{
    --bg:#F7F9F8;
    --surface:#FFFFFF;
    --border:#E4E9E7;
    --ink:#101816;
    --ink-muted:#5C6A66;
    --primary:#0E7C6B;
    --primary-dark:#095E51;
    --primary-soft:#E4F3EF;
    --amber:#D97B0D;
    --amber-soft:#FBEBD8;
    --danger:#C43D3D;
    --danger-soft:#FBE9E9;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  .icon{display:inline-flex;vertical-align:middle;}
  .icon svg{display:block;}

  /* ---------- Login screen ---------- */
  .login-wrap{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
  .login-wrap::before{
    content:"";position:absolute;inset:0;
    background-image:
      radial-gradient(circle at 15% 20%, var(--primary-soft) 0%, transparent 35%),
      radial-gradient(circle at 85% 75%, var(--amber-soft) 0%, transparent 40%);
    opacity:.9;
  }
  .float-pin{position:absolute;opacity:.16;animation:float 7s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-16px) rotate(4deg);}}
  .login-card-wrap{position:relative;z-index:1;width:100%;max-width:380px;}
  .brand-mark{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
  .pin-badge{width:64px;height:64px;border-radius:20px;background:#111111;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.22);}
  .pin-ring{position:absolute;inset:-8px;border-radius:26px;border:2px solid var(--primary);opacity:0;animation:ping 2.4s cubic-bezier(0,0,.2,1) infinite;}
  .pin-ring.d2{animation-delay:.8s;}
  @keyframes ping{0%{transform:scale(1);opacity:.55;}80%{transform:scale(1.5);opacity:0;}100%{opacity:0;}}
  .brand-mark h1{font-size:21px;font-weight:800;letter-spacing:-0.02em;margin:0;}
  .brand-mark p{font-size:13px;color:var(--ink-muted);margin:4px 0 0;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;box-shadow:0 1px 3px rgba(16,24,22,.04);}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-muted);margin-bottom:6px;}
  .field-input{width:100%;padding:11px 13px;border-radius:12px;border:1px solid var(--border);font-size:14px;outline:none;margin-bottom:16px;transition:border-color .15s;}
  .field-input:focus{border-color:var(--primary);}
  .login-btn{width:100%;padding:12px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
  .login-btn:hover{background:var(--primary-dark);}
  .auth-error{display:flex;align-items:center;gap:6px;color:var(--danger);font-size:13px;margin:-8px 0 14px;}

  /* ---------- Dashboard shell ---------- */
  .app-header{background:var(--surface);border-bottom:1px solid var(--border);}
  .header-inner{max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-logo{width:40px;height:40px;border-radius:12px;background:#111111;display:flex;align-items:center;justify-content:center;}
  .header-title{font-size:15px;font-weight:800;letter-spacing:-0.01em;margin:0;}
  .header-sub{font-size:12px;color:var(--ink-muted);margin:1px 0 0;}
  .signout-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-muted);padding:8px 10px;border-radius:8px;transition:background .15s;}
  .signout-btn:hover{background:var(--bg);}

  /* dispatch route divider — signature animation: a rider delivering across the route */
  .route-strip{height:34px;position:relative;overflow:hidden;}
  .route-strip{max-width:1080px;margin:0 auto;padding:0 24px;}
  .route-track{position:relative;height:2px;top:18px;background:repeating-linear-gradient(90deg,var(--border) 0 8px,transparent 8px 16px);}
  .route-bike{position:absolute;top:-17px;left:0;color:#161616;animation:ride 16s linear infinite;}
  .route-bike svg{display:block;animation:bob .6s ease-in-out infinite alternate;}
  @keyframes ride{0%{left:0%;transform:scaleX(1);}48%{transform:scaleX(1);}50%{left:calc(100% - 38px);transform:scaleX(-1);}98%{transform:scaleX(-1);}100%{left:0%;transform:scaleX(1);}}
  @keyframes bob{from{transform:translateY(0);}to{transform:translateY(-1.2px);}}

  /* logo (actual brand image) */
  .logo-img{display:block;object-fit:cover;border-radius:16px;}
  .brand-mark .logo-img{width:78px;height:78px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.22);}
  .header-logo-img{width:38px;height:38px;border-radius:11px;}

  /* wordmark (product name, sits under/next to the real logo) */
  .zippee-mark{display:flex;align-items:center;gap:8px;}
  .zippee-word{font-size:19px;font-weight:800;letter-spacing:-0.01em;color:var(--ink);}
  .zippee-word sup{font-size:9px;font-weight:700;}
  .zippee-word.on-dark{color:#fff;}

  .main{max-width:1080px;margin:0 auto;padding:22px 24px 90px;}
  .alert-bar{display:flex;align-items:center;gap:8px;font-size:13px;padding:11px 14px;border-radius:12px;margin-bottom:16px;background:var(--danger-soft);color:var(--danger);}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;transition:transform .2s, box-shadow .2s;}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(16,24,22,.06);}
  .stat-icon{width:38px;height:38px;border-radius:12px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .stat-value{font-size:19px;font-weight:800;line-height:1;}
  .stat-label{font-size:12px;color:var(--ink-muted);margin-top:3px;}

  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px;}
  .search-wrap{position:relative;flex:1;min-width:220px;}
  .search-wrap .icon{position:absolute;left:12px;top:11px;color:var(--ink-muted);}
  .search-input{width:100%;padding:11px 13px 11px 36px;border-radius:12px;border:1px solid var(--border);font-size:14px;outline:none;background:var(--surface);}
  .search-input:focus{border-color:var(--primary);}
  .select-wrap{position:relative;}
  .select-wrap select{appearance:none;padding:11px 30px 11px 34px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-size:14px;cursor:pointer;color:var(--ink);}
  .select-wrap .icon-left{position:absolute;left:11px;top:12px;color:var(--ink-muted);pointer-events:none;}
  .select-wrap .icon-right{position:absolute;right:10px;top:13px;color:var(--ink-muted);pointer-events:none;}
  .add-btn{display:flex;align-items:center;gap:7px;padding:11px 16px;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;transition:background .15s, transform .1s;}
  .add-btn:hover{background:var(--primary-dark);}
  .add-btn:active{transform:scale(.97);}
  .util-btn{display:flex;align-items:center;gap:7px;padding:11px 15px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:13.5px;font-weight:700;transition:background .15s, transform .1s;}
  .util-btn:hover{background:var(--bg);}
  .util-btn:active{transform:scale(.97);}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
  .row-grid{display:grid;grid-template-columns:36px 1.6fr .8fr 1fr 1.4fr 1fr 100px;align-items:center;padding:12px 16px;}
  .table-head{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink-muted);border-bottom:1px solid var(--border);}
  .store-row{font-size:13.5px;border-bottom:1px solid var(--border);transition:background .15s;position:relative;}
  .store-row:last-child{border-bottom:none;}
  .store-row:hover{background:#FAFCFB;}
  .store-row:hover .row-pin{transform:scale(1.15) translateY(-2px);color:var(--primary);}
  .row-pin{transition:transform .2s, color .2s;color:var(--ink-muted);}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .check-btn{display:flex;align-items:center;justify-content:center;color:var(--ink-muted);}
  .store-name{font-weight:700;padding-right:8px;}
  .brand-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--amber-soft);color:var(--amber);display:inline-block;}
  .poc-name{color:var(--ink);}
  .poc-phone{font-size:11.5px;color:var(--ink-muted);}
  .dash{opacity:.45;font-size:12px;}
  .row-actions{display:flex;align-items:center;justify-content:flex-end;gap:2px;}
  .icon-btn{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:background .15s,color .15s, transform .1s;}
  .icon-btn:hover{background:var(--primary-soft);color:var(--primary);}
  .icon-btn:active{transform:scale(.9);}
  .icon-btn.danger:hover{background:var(--danger-soft);color:var(--danger);}
  .empty-state,.loading-state{padding:60px 20px;text-align:center;color:var(--ink-muted);font-size:14px;}
  .empty-state .icon,.loading-state .icon{opacity:.4;margin-bottom:8px;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* floating selection bar */
  .float-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(0);display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:16px;background:var(--ink);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:riseUp .25s ease-out;z-index:40;}
  @keyframes riseUp{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .float-copy{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:8px 13px;border-radius:10px;background:var(--primary);color:#fff;}
  .float-clear{font-size:13px;font-weight:600;color:#cfd8d5;}

  /* toast */
  .toast{position:fixed;top:20px;right:20px;display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:12px;background:var(--ink);color:#fff;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:60;animation:slideIn .25s ease-out;}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;animation:fadeIn .15s ease-out;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-card{width:100%;max-width:520px;background:var(--surface);border-radius:20px;padding:24px;max-height:88vh;overflow-y:auto;animation:popIn .2s ease-out;}
  @keyframes popIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .modal-head{display:flex;align-items:center;justify-content:between;justify-content:space-between;margin-bottom:16px;}
  .modal-title{font-size:15px;font-weight:800;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-muted);margin-bottom:5px;}
  .form-field input,.form-field textarea{width:100%;padding:9px 11px;border-radius:10px;border:1px solid var(--border);font-size:13.5px;outline:none;margin-bottom:12px;}
  .form-field input:focus,.form-field textarea:focus{border-color:var(--primary);}
  .form-field textarea{resize:none;}
  .modal-actions{display:flex;align-items:center;gap:10px;margin-top:6px;}
  .btn-primary{flex:1;padding:11px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:13.5px;transition:background .15s;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-secondary{padding:11px 16px;border-radius:12px;border:1px solid var(--border);color:var(--ink-muted);font-weight:700;font-size:13.5px;}
  .btn-danger{flex:1;padding:11px;border-radius:12px;background:var(--danger);color:#fff;font-weight:700;font-size:13.5px;}
  .form-error{display:flex;align-items:center;gap:6px;color:var(--danger);font-size:12.5px;margin:2px 0 8px;}

  @media (max-width:720px){
    .row-grid{grid-template-columns:24px 1.4fr 1fr 90px;}
    .table-head > div:nth-child(4),.table-head > div:nth-child(5),
    .store-row .col-city,.store-row .col-address{display:none;}
    .stats-row{grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .grid2{grid-template-columns:1fr;}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  loader:(s=18)=>`<svg class="icon spin" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>`,

  download:(s=15)=>`<svg class="icon" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  bike:(s=36)=>`<svg width="${s}" height="${s*0.62}" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">

    <circle cx="35" cy="24" r="2.1" fill="#fff"/>

function sbConfigured(){ return !!(SUPABASE_URL && SUPABASE_ANON_KEY); }
function sbHeaders(extra){
  return Object.assign({
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
  }, extra||{});
}
function toDbRecord(s){
  return {
    id: s.id, store_name: s.storeName, brand_code: s.brandCode,
    location: s.location, city: s.city, address: s.address,
    maps_link: s.mapsLink, poc_name: s.pocName, poc_phone: s.pocPhone,
  };
}
function fromDbRecord(row){
  return {
    id: row.id, storeName: row.store_name, brandCode: row.brand_code,
    location: row.location, city: row.city, address: row.address,
    mapsLink: row.maps_link, pocName: row.poc_name, pocPhone: row.poc_phone,
  };
}
async function sbFetchAll(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?select=*&order=created_at.desc`, { headers: sbHeaders() });
  if(!res.ok) throw new Error("Supabase fetch failed: "+res.status);
  const rows = await res.json();
  return rows.map(fromDbRecord);
}
async function sbInsertMany(records){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores`, {
    method:"POST", headers: sbHeaders({"Prefer":"return=representation"}),
    body: JSON.stringify(records.map(toDbRecord)),
  });
  if(!res.ok) throw new Error("Supabase insert failed: "+res.status);
  return (await res.json()).map(fromDbRecord);
}
async function sbUpdateOne(id, record){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?id=eq.${encodeURIComponent(id)}`, {
    method:"PATCH", headers: sbHeaders({"Prefer":"return=representation"}),
    body: JSON.stringify(toDbRecord(record)),
  });
  if(!res.ok) throw new Error("Supabase update failed: "+res.status);
  return (await res.json()).map(fromDbRecord)[0];
}
async function sbDeleteOne(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?id=eq.${encodeURIComponent(id)}`, {
    method:"DELETE", headers: sbHeaders(),
  });
  if(!res.ok) throw new Error("Supabase delete failed: "+res.status);
}

async function loadStores(){
  state.loading=true; state.loadError=""; renderApp();

  if(sbConfigured()){
    try{
      state.stores = await sbFetchAll();
      state.loading=false; renderApp(); animateCounts();
      return;
    }catch(e){
      state.loadError = "Couldn't reach Supabase — check the URL/key in the script. Showing local data instead.";
    }
  }

  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ state.stores = JSON.parse(res.value); }
    else{
      state.stores = seedStores;
      await window.storage.set(STORAGE_KEY, JSON.stringify(seedStores), true);
    }
  }catch(e){
    state.stores = seedStores;
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(seedStores), true); }
    catch(e2){ state.loadError = "Could not connect to shared storage. Showing local sample data only."; }
  }
  state.loading=false;
  renderApp();
  animateCounts();
}

// Persists the full local array — used only in local (non-Supabase) mode.
async function persistLocal(next){
  state.stores = next;
  renderApp();
  try{
    const res = await window.storage.set(STORAGE_KEY, JSON.stringify(next), true);
    if(!res) throw new Error("no result");
  }catch(e){
    flashToast("Could not save — check your connection and try again");
  }
}

async function addStores(records){
  state.stores = [...records, ...state.stores];
  renderApp();
  if(sbConfigured()){
    try{ await sbInsertMany(records); }
    catch(e){ flashToast("Saved locally, but Supabase insert failed — check your connection"); }
  } else {
    try{
      const res = await window.storage.set(STORAGE_KEY, JSON.stringify(state.stores), true);
      if(!res) throw new Error("no result");
    }catch(e){ flashToast("Could not save — check your connection and try again"); }
  }
}

async function updateStoreById(id, record){
  state.stores = state.stores.map(s=> s.id===id ? record : s);
  renderApp();
  if(sbConfigured()){
    try{ await sbUpdateOne(id, record); }
    catch(e){ flashToast("Saved locally, but Supabase update failed — check your connection"); }
  } else {
    try{
      const res = await window.storage.set(STORAGE_KEY, JSON.stringify(state.stores), true);
      if(!res) throw new Error("no result");
    }catch(e){ flashToast("Could not save — check your connection and try again"); }
  }
}

async function deleteStoreById(id){
  state.stores = state.stores.filter(s=>s.id!==id);
  state.selected.delete(id);
  renderApp();
  if(sbConfigured()){
    try{ await sbDeleteOne(id); }
    catch(e){ flashToast("Removed locally, but Supabase delete failed — check your connection"); }
  } else {
    try{
      const res = await window.storage.set(STORAGE_KEY, JSON.stringify(state.stores), true);
      if(!res) throw new Error("no result");
    }catch(e){ flashToast("Could not save — check your connection and try again"); }
  }
}

function flashToast(msg){
  state.toast = msg;
  renderToast();
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ state.toast=""; renderToast(); }, 2200);
}

/* ---------------- Derived data ---------------- */
function getBrands(){
  return ["All", ...Array.from(new Set(state.stores.map(s=>s.brandCode).filter(Boolean))).sort()];
}
function getCities(){
  return ["All", ...Array.from(new Set(state.stores.map(s=>s.city||s.location).filter(Boolean))).sort()];
}
function getFiltered(){
  const q = state.search.trim().toLowerCase();
  return state.stores.filter(s=>{
    const matchesSearch = !q || [s.storeName,s.location,s.city,s.address,s.pocName,s.pocPhone,s.brandCode].join(" ").toLowerCase().includes(q);
    const matchesBrand = state.brandFilter==="All" || s.brandCode===state.brandFilter;
    const matchesCity = state.cityFilter==="All" || (s.city||s.location)===state.cityFilter;
    return matchesSearch && matchesBrand && matchesCity;
  });
}

/* ---------------- Master render ---------------- */
function renderApp(){
  const app = document.getElementById("app");
  app.innerHTML = state.authed ? renderDashboard() : renderLogin();
  if(!document.getElementById("toastRoot")){
    const t = document.createElement("div"); t.id="toastRoot"; document.body.appendChild(t);
  }
  renderToast();

function animateCounts(){
  document.querySelectorAll("[data-count]").forEach(el=>{
    const target = parseInt(el.getAttribute("data-count"),10)||0;
    let cur=0; const step = Math.max(1, Math.ceil(target/20));
    const timer = setInterval(()=>{
      cur += step;
      if(cur>=target){ cur=target; clearInterval(timer); }
      el.textContent = cur;
    }, 25);
  });
}

/* ---------------- Partial re-renders (preserve input focus) ---------------- */
function rerenderTableOnly(){
  const wrap = document.getElementById("tableWrap");
  if(wrap) wrap.outerHTML = renderTableSection();
  const fb = document.getElementById("floatBarRoot");
  if(fb) fb.innerHTML = renderFloatBar();
  const header = document.querySelector(".header-sub");
  if(header) header.textContent = `${state.stores.length} stores across ${getCities().length-1} cities`;
}

/* ---------------- Excel import / export ---------------- */
function normKey(k){ return String(k||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

function findVal(row, candidates){
  const keys = Object.keys(row);
  for(const cand of candidates){
    const nc = normKey(cand);
    const match = keys.find(k=>normKey(k)===nc);
    if(match!==undefined && row[match]!==undefined && row[match]!==null) return String(row[match]).trim();
  }
  return "";
}

function handleImportFile(file){
  if(!file) return;
  if(typeof XLSX==="undefined"){ flashToast("Excel library failed to load — check your connection"); return; }
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:"array"});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
      if(rows.length===0){ flashToast("That file doesn't have any rows to import"); return; }

      const imported = rows.map(row=>{
        const storeNameRaw = findVal(row, ["Store name","Store Name","StoreName","Name"]);
        const brandCode = findVal(row, ["Brand","Brand code","BrandCode"]);
        const address = findVal(row, ["Address","Full address"]);
        const location = findVal(row, ["Location","Area","Locality"]);
        const pocName = findVal(row, ["POC name","POC Name","POCName","Contact name"]);
        const pocPhone = findVal(row, ["POC number","POC Number","POCNumber","Phone","POC phone","Contact number"]);
        const storeName = storeNameRaw || `ZD ${brandCode} ${location}`.replace(/\s+/g," ").trim();
        return {
          id: genId(),
          brandCode, location, city: location, storeName,
          address, mapsLink: "", pocName, pocPhone,
        };
      }).filter(r=> r.location || r.address || r.storeName);

      if(imported.length===0){ flashToast("Couldn't find any valid rows — check the column headers"); return; }

      await addStores(imported);
      flashToast(`Imported ${imported.length} store${imported.length>1?"s":""}`);
    }catch(err){
      flashToast("Couldn't read that file — please check the format");
    }
  };
  reader.onerror = function(){ flashToast("Couldn't read that file"); };
  reader.readAsArrayBuffer(file);
}

function exportToExcel(){
  if(typeof XLSX==="undefined"){ flashToast("Excel library failed to load — check your connection"); return; }
  const rows = state.stores.map(s=>({
    "Store name": s.storeName || "",
    "Brand": s.brandCode || "",
    "Address": s.address || "",
    "Location": s.city || s.location || "",
    "POC name": s.pocName || "",
    "POC number": s.pocPhone || "",
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{wch:26},{wch:10},{wch:46},{wch:18},{wch:18},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Store Master");
  XLSX.writeFile(wb, "zippee-location-master.xlsx");
  flashToast(`Exported ${state.stores.length} stores`);
}

/* ---------------- Event delegation ---------------- */
document.addEventListener("submit", function(e){
  if(e.target.id==="loginForm"){
    e.preventDefault();
    const u = document.getElementById("loginUser").value;
    const p = document.getElementById("loginPass").value;
    if(u==="Bizops2026" && p==="Zippee@123"){
      state.authed=true; state.authError="";
      renderApp();
      loadStores();
    } else {
      state.authError = "That ID or password isn't right. Try again.";
      renderApp();
    }
  }
});

document.addEventListener("input", function(e){
  if(e.target.id==="searchInput"){
    state.search = e.target.value;
    rerenderTableOnly();
  }
});

document.addEventListener("change", function(e){
  if(e.target.id==="brandFilterSel"){ state.brandFilter = e.target.value; rerenderTableOnly(); }
  if(e.target.id==="cityFilterSel"){ state.cityFilter = e.target.value; rerenderTableOnly(); }
  if(e.target.id==="importFileInput"){ handleImportFile(e.target.files[0]); e.target.value=""; }
});

document.addEventListener("click", async function(e){
  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.getAttribute("data-action");
  const id = btn.getAttribute("data-id");

  if(action==="signout"){ state.authed=false; state.selected=new Set(); renderApp(); return; }

  if(action==="toggle-row"){
    state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
    rerenderTableOnly(); return;
  }
  if(action==="toggle-all"){
    const filtered = getFiltered();
    const allSelected = filtered.length>0 && filtered.every(s=>state.selected.has(s.id));
    filtered.forEach(s=> allSelected ? state.selected.delete(s.id) : state.selected.add(s.id));
    rerenderTableOnly(); return;
  }
  if(action==="clear-selected"){ state.selected=new Set(); rerenderTableOnly(); return; }

  if(action==="copy-one" || action==="copy-selected"){
    const ids = action==="copy-one" ? [id] : Array.from(state.selected);
    const chosen = state.stores.filter(s=>ids.includes(s.id));
    if(chosen.length===0) return;
    const text = chosen.map(formatStore).join("\n\n");
    try{
      await navigator.clipboard.writeText(text);
      flashToast(`Copied ${chosen.length} store${chosen.length>1?"s":""} to clipboard`);
    }catch(err){ flashToast("Couldn't access clipboard — please copy manually"); }
    return;
  }

  if(action==="open-add"){ state.modal={mode:"add"}; document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm(); return; }
  if(action==="import-excel"){ document.getElementById("importFileInput").click(); return; }
  if(action==="export-excel"){ exportToExcel(); return; }
  if(action==="edit"){ state.modal={mode:"edit", id}; document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm(); return; }
  if(action==="close-modal"){ state.modal=null; document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm(); return; }

  if(action==="save-form"){
    const brandCode = document.getElementById("fBrand").value.trim();
    const location = document.getElementById("fLocation").value.trim();
    const city = document.getElementById("fCity").value.trim();
    const storeNameRaw = document.getElementById("fStoreName").value.trim();
    const address = document.getElementById("fAddress").value.trim();
    const mapsLink = document.getElementById("fMaps").value.trim();
    const pocName = document.getElementById("fPocName").value.trim();
    const pocPhone = document.getElementById("fPocPhone").value.trim();

    if(!location || !address){
      document.getElementById("formErrorWrap").innerHTML = `<div class="form-error">${ICONS.alert(14)} Location and address are required.</div>`;
      return;
    }
    const storeName = storeNameRaw || `ZD ${brandCode} ${location}`.replace(/\s+/g," ").trim();
    const record = { id: state.modal.mode==='edit'?state.modal.id:genId(), brandCode, location, city: city||location, storeName, address, mapsLink, pocName, pocPhone };
    const isEdit = state.modal.mode==='edit';
    state.modal=null;
    if(isEdit){ await updateStoreById(record.id, record); }
    else { await addStores([record]); }
    document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm();
    flashToast("Saved");
    return;
  }

  if(action==="ask-delete"){ state.deleteId=id; document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm(); return; }
  if(action==="cancel-delete"){ state.deleteId=null; document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm(); return; }
  if(action==="confirm-delete"){
    const id = state.deleteId;
    state.deleteId=null;
    await deleteStoreById(id);
    document.getElementById("modalRoot").innerHTML = renderModal()+renderDeleteConfirm();
    flashToast("Store deleted");
    return;
  }
});

/* ---------------- Init ---------------- */
renderApp();
</script>
