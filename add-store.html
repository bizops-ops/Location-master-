<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zippee · Add Store</title>
<style>
  :root{
    --bg:#F7F9F8;
    --surface:#FFFFFF;
    --border:#E4E9E7;
    --ink:#101816;
    --ink-muted:#5C6A66;
    --primary:#0E7C6B;
    --primary-dark:#095E51;
    --primary-soft:#E4F3EF;
    --danger:#C43D3D;
    --danger-soft:#FBE9E9;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,textarea{font-family:inherit;}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card-wrap{width:100%;max-width:440px;}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:22px;}
  .logo{width:64px;height:64px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.18);margin-bottom:12px;object-fit:cover;}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-0.01em;margin:0;}
  .brand p{font-size:13px;color:var(--ink-muted);margin:4px 0 0;text-align:center;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-muted);margin-bottom:6px;}
  .field input,.field textarea{width:100%;padding:11px 13px;border-radius:12px;border:1px solid var(--border);font-size:14px;outline:none;margin-bottom:14px;transition:border-color .15s;}
  .field input:focus,.field textarea:focus{border-color:var(--primary);}
  .field textarea{resize:none;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .submit-btn{width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:14.5px;transition:background .15s, transform .1s;}
  .submit-btn:hover{background:var(--primary-dark);}
  .submit-btn:active{transform:scale(.98);}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;}
  .msg{display:flex;align-items:center;gap:8px;font-size:13px;padding:11px 13px;border-radius:12px;margin-bottom:14px;}
  .msg.success{background:var(--primary-soft);color:var(--primary-dark);}
  .msg.error{background:var(--danger-soft);color:var(--danger);}
  .gate-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;}
  .gate-btn{width:100%;padding:12px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:14px;}
  .footer-note{text-align:center;font-size:11.5px;color:var(--ink-muted);margin-top:16px;}
</style>
</head>

function genId(){ return "store_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let unlocked = false;
let submitting = false;
let banner = null; // {type:'success'|'error', text}

function renderGate(){
  return `
  <div class="wrap">
    <div class="card-wrap">
      <div class="brand">
        <img class="logo" src="${LOGO_DATA_URI}" alt="Zippee" />
        <h1>Add a Store</h1>
        <p>Enter the access code shared with your team to continue.</p>
      </div>
      <div class="gate-card">
        <div class="field">
          <label>Access code</label>
          <input id="gateCode" placeholder="Enter access code" />
        </div>
        ${banner && banner.type==='error' ? `<div class="msg error">${esc(banner.text)}</div>` : ""}
        <button class="gate-btn" id="gateBtn">Continue</button>
      </div>
    </div>
  </div>`;
}

function renderForm(){
  return `
  <div class="wrap">
    <div class="card-wrap">
      <div class="brand">
        <img class="logo" src="${LOGO_DATA_URI}" alt="Zippee" />
        <h1>Add a Store</h1>
        <p>Fill in the details below. Once submitted, it'll show up on the central team's dashboard.</p>
      </div>
      <div class="card">
        ${banner ? `<div class="msg ${banner.type}">${esc(banner.text)}</div>` : ""}
        <div class="grid2">
          <div class="field"><label>Brand code</label><input id="fBrand" placeholder="OZI, QKY, MT…" /></div>
          <div class="field"><label>Location</label><input id="fLocation" placeholder="Dwarka, Jakkur…" /></div>
        </div>
        <div class="field"><label>City</label><input id="fCity" placeholder="Delhi, Bengaluru…" /></div>
        <div class="field"><label>Full address</label><textarea id="fAddress" rows="3" placeholder="Full store / warehouse address"></textarea></div>
        <div class="field"><label>Google Maps link</label><input id="fMaps" placeholder="https://maps.app.goo.gl/…" /></div>
        <div class="grid2">
          <div class="field"><label>POC name</label><input id="fPocName" placeholder="Contact person" /></div>
          <div class="field"><label>POC phone</label><input id="fPocPhone" placeholder="+91 …" /></div>
        </div>
        <button class="submit-btn" id="submitBtn" ${submitting?"disabled":""}>${submitting?"Submitting…":"Submit store"}</button>
      </div>
      <p class="footer-note">This link can only add new stores — it can't view, edit, or delete anything.</p>
    </div>
  </div>`;
}

function render(){
  document.getElementById("app").innerHTML = unlocked ? renderForm() : renderGate();
  if(!unlocked){
    document.getElementById("gateBtn").addEventListener("click", handleGate);
    document.getElementById("gateCode").addEventListener("keydown", e=>{ if(e.key==="Enter") handleGate(); });
  } else {
    document.getElementById("submitBtn").addEventListener("click", handleSubmit);
  }
}

function handleGate(){
  const code = document.getElementById("gateCode").value.trim();
  if(code === STORE_ACCESS_CODE){
    unlocked = true; banner = null;
  } else {
    banner = {type:"error", text:"That code doesn't match. Please check with your team lead."};
  }
  render();
}

function normKey(s){
  return String(s||"").trim().toLowerCase().replace(/\s+/g," ");
}

async function checkDuplicate(storeName, address){
  const nName = normKey(storeName);
  const nAddr = normKey(address);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?select=store_name,address`, {
    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer "+SUPABASE_ANON_KEY },
  });
  if(!res.ok) throw new Error("Lookup failed: "+res.status);
  const rows = await res.json();
  return rows.some(r=>{
    const rName = normKey(r.store_name);
    const rAddr = normKey(r.address);
    return (nName && rName===nName) || (nAddr && rAddr===nAddr);
  });
}

async function handleSubmit(){
  const brandCode = document.getElementById("fBrand").value.trim();
  const location = document.getElementById("fLocation").value.trim();
  const city = document.getElementById("fCity").value.trim();
  const address = document.getElementById("fAddress").value.trim();
  const mapsLink = document.getElementById("fMaps").value.trim();
  const pocName = document.getElementById("fPocName").value.trim();
  const pocPhone = document.getElementById("fPocPhone").value.trim();

  if(!location || !address){
    banner = {type:"error", text:"Location and address are required."};
    render();
    return;
  }

  const storeName = `ZD ${brandCode} ${location}`.replace(/\s+/g," ").trim();

  submitting = true; banner = null; render();
  try{
    const isDup = await checkDuplicate(storeName, address);
    if(isDup){
      submitting = false;
      banner = {type:"error", text:"A store with this name or address already exists. Please check the list with your team lead before adding it again."};
      render();
      return;
    }
  }catch(e){
    submitting = false;
    banner = {type:"error", text:"Couldn't check for duplicates — check your connection and try again."};
    render();
    return;
  }

  const record = {
    id: genId(), store_name: storeName, brand_code: brandCode,
    location, city: city || location, address, maps_link: mapsLink,
    poc_name: pocName, poc_phone: pocPhone,
  };

  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/stores`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      },
      body: JSON.stringify([record]),
    });
    if(!res.ok) throw new Error("Insert failed: "+res.status);
    submitting = false;
    banner = {type:"success", text:"Store submitted! You can add another below."};
    render();
    ["fBrand","fLocation","fCity","fAddress","fMaps","fPocName","fPocPhone"].forEach(id=>{
      const el = document.getElementById(id); if(el) el.value = "";
    });
  }catch(e){
    submitting = false;
    banner = {type:"error", text:"Couldn't submit — check your connection and try again."};
    render();
  }
}

render();
</script>
</body>
</html>
