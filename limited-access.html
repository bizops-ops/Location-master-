<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zippee · Location Master (Limited)</title>
<style>
  :root{
    --bg:#F7F9F8; --surface:#FFFFFF; --border:#E4E9E7;
    --ink:#101816; --ink-muted:#5C6A66;
    --primary:#0E7C6B; --primary-dark:#095E51; --primary-soft:#E4F3EF;
    --amber:#D97B0D; --amber-soft:#FBEBD8;
    --danger:#C43D3D; --danger-soft:#FBE9E9;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,select,textarea{font-family:inherit;}
  .icon{display:inline-flex;vertical-align:middle;}
  .icon svg{display:block;}

  .login-wrap{min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card-wrap{width:100%;max-width:380px;}
  .brand-mark{display:flex;flex-direction:column;align-items:center;margin-bottom:22px;}
  .logo-img{width:64px;height:64px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.18);margin-bottom:12px;object-fit:cover;}
  .brand-mark h1{font-size:19px;font-weight:800;letter-spacing:-0.01em;margin:0;}
  .brand-mark p{font-size:13px;color:var(--ink-muted);margin:4px 0 0;text-align:center;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-muted);margin-bottom:6px;}
  .field-input{width:100%;padding:11px 13px;border-radius:12px;border:1px solid var(--border);font-size:14px;outline:none;margin-bottom:14px;}
  .field-input:focus{border-color:var(--primary);}
  .login-btn{width:100%;padding:12px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:14px;}
  .auth-error{display:flex;align-items:center;gap:6px;color:var(--danger);font-size:13px;margin:-6px 0 14px;}

  .app-header{background:var(--surface);border-bottom:1px solid var(--border);}
  .header-inner{max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-logo-img{width:38px;height:38px;border-radius:11px;}
  .header-title{font-size:15px;font-weight:800;margin:0;letter-spacing:-0.01em;}
  .header-sub{font-size:12px;color:var(--ink-muted);margin:1px 0 0;}
  .signout-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-muted);padding:8px 10px;border-radius:8px;}
  .signout-btn:hover{background:var(--bg);}

  .scope-banner{display:flex;align-items:center;gap:8px;font-size:13px;padding:11px 14px;border-radius:12px;margin-bottom:16px;background:var(--primary-soft);color:var(--primary-dark);font-weight:600;}
  .main{max-width:1080px;margin:0 auto;padding:22px 24px 90px;}
  .alert-bar{display:flex;align-items:center;gap:8px;font-size:13px;padding:11px 14px;border-radius:12px;margin-bottom:16px;background:var(--danger-soft);color:var(--danger);}

  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px;}
  .search-wrap{position:relative;flex:1;min-width:220px;}
  .search-wrap .icon{position:absolute;left:12px;top:11px;color:var(--ink-muted);}
  .search-input{width:100%;padding:11px 13px 11px 36px;border-radius:12px;border:1px solid var(--border);font-size:14px;outline:none;background:var(--surface);}
  .search-input:focus{border-color:var(--primary);}
  .util-btn{display:flex;align-items:center;gap:7px;padding:11px 15px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:13.5px;font-weight:700;}
  .util-btn:hover{background:var(--bg);}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
  .row-grid{display:grid;grid-template-columns:36px 1.6fr .8fr 1fr 1.4fr 1fr 70px;align-items:center;padding:12px 16px;}
  .table-head{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink-muted);border-bottom:1px solid var(--border);}
  .store-row{font-size:13.5px;border-bottom:1px solid var(--border);}
  .store-row:last-child{border-bottom:none;}
  .store-row:hover{background:#FAFCFB;}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .check-btn{display:flex;align-items:center;justify-content:center;color:var(--ink-muted);}
  .store-name{font-weight:700;padding-right:8px;}
  .brand-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--amber-soft);color:var(--amber);display:inline-block;}
  .poc-name{color:var(--ink);}
  .poc-phone{font-size:11.5px;color:var(--ink-muted);}
  .dash{opacity:.45;font-size:12px;}
  .row-actions{display:flex;align-items:center;justify-content:flex-end;gap:2px;}
  .icon-btn{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);}
  .icon-btn:hover{background:var(--primary-soft);color:var(--primary);}
  .empty-state,.loading-state{padding:60px 20px;text-align:center;color:var(--ink-muted);font-size:14px;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .float-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;padding:12px 18px;border-radius:16px;background:var(--ink);color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:40;}
  .float-copy{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:8px 13px;border-radius:10px;background:var(--primary);color:#fff;}
  .float-clear{font-size:13px;font-weight:600;color:#cfd8d5;}

  .toast{position:fixed;top:20px;right:20px;display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:12px;background:var(--ink);color:#fff;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:60;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;}
  .modal-card{width:100%;max-width:520px;background:var(--surface);border-radius:20px;padding:24px;max-height:88vh;overflow-y:auto;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-title{font-size:15px;font-weight:800;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-muted);margin-bottom:5px;}
  .form-field input,.form-field textarea{width:100%;padding:9px 11px;border-radius:10px;border:1px solid var(--border);font-size:13.5px;outline:none;margin-bottom:12px;}
  .form-field textarea{resize:none;}
  .modal-actions{display:flex;align-items:center;gap:10px;margin-top:6px;}
  .btn-primary{flex:1;padding:11px;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;font-size:13.5px;}
  .btn-secondary{padding:11px 16px;border-radius:12px;border:1px solid var(--border);color:var(--ink-muted);font-weight:700;font-size:13.5px;}
  .form-error{display:flex;align-items:center;gap:6px;color:var(--danger);font-size:12.5px;margin:2px 0 8px;}

  @media (max-width:720px){
    .row-grid{grid-template-columns:24px 1.4fr 1fr 60px;}
    .table-head > div:nth-child(4),.table-head > div:nth-child(5),
    .store-row .col-city,.store-row .col-address{display:none;}
    .grid2{grid-template-columns:1fr;}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

function esc(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function formatStore(s){
  const lines=[s.storeName || `ZD ${s.brandCode} ${s.location}`.trim()];
  if(s.address) lines.push(`Address: ${s.address}`);
  if(s.mapsLink) lines.push(`Location: ${s.mapsLink}`);
  lines.push("POC:");
  if(s.pocName) lines.push(s.pocName);
  if(s.pocPhone) lines.push(s.pocPhone);
  return lines.join("\n");
}
function sbHeaders(extra){
  return Object.assign({
    "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer "+SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
  }, extra||{});
}
function toDbRecord(s){
  return { id:s.id, store_name:s.storeName, brand_code:s.brandCode, location:s.location,
    city:s.city, address:s.address, maps_link:s.mapsLink, poc_name:s.pocName, poc_phone:s.pocPhone };
}
function fromDbRecord(row){
  return { id:row.id, storeName:row.store_name, brandCode:row.brand_code, location:row.location,
    city:row.city, address:row.address, mapsLink:row.maps_link, pocName:row.poc_name, pocPhone:row.poc_phone };
}
async function sbFetchAll(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?select=*&order=created_at.desc`, {headers:sbHeaders()});
  if(!res.ok) throw new Error("fetch failed: "+res.status);
  return (await res.json()).map(fromDbRecord);
}
async function sbUpdateOne(id, record){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/stores?id=eq.${encodeURIComponent(id)}`, {
    method:"PATCH", headers:sbHeaders({"Prefer":"return=representation"}), body:JSON.stringify(toDbRecord(record)),
  });
  if(!res.ok) throw new Error("update failed: "+res.status);
  return (await res.json()).map(fromDbRecord)[0];
}

let state = {
  authed:false, authError:"",
  allStores:[], loading:true, loadError:"",
  search:"", selected:new Set(),
  modal:null, toast:"",
};
let toastTimer=null;

function scopeLabel(){
  const parts=[];
  if(SCOPE_FILTER.city) parts.push(`City: ${SCOPE_FILTER.city}`);
  if(SCOPE_FILTER.brandCode) parts.push(`Brand: ${SCOPE_FILTER.brandCode}`);
  return parts.length ? parts.join(" · ") : "All stores (no scope set)";
}
function inScope(s){
  const cityOk = !SCOPE_FILTER.city || (s.city||s.location||"").toLowerCase()===SCOPE_FILTER.city.toLowerCase();
  const brandOk = !SCOPE_FILTER.brandCode || (s.brandCode||"").toLowerCase()===SCOPE_FILTER.brandCode.toLowerCase();
  return cityOk && brandOk;
}
function getScoped(){ return state.allStores.filter(inScope); }
function getFiltered(){
  const q = state.search.trim().toLowerCase();
  return getScoped().filter(s=>{
    if(!q) return true;
    return [s.storeName,s.location,s.city,s.address,s.pocName,s.pocPhone,s.brandCode].join(" ").toLowerCase().includes(q);
  });
}

async function loadStores(){
  state.loading=true; state.loadError=""; renderApp();
  try{
    state.allStores = await sbFetchAll();
  }catch(e){
    state.loadError = "Couldn't reach the database — check your connection.";
    state.allStores = [];
  }
  state.loading=false; renderApp();
}

function flashToast(msg){
  state.toast=msg; renderToast();
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{state.toast="";renderToast();},2200);
}
function renderToast(){
  const el=document.getElementById("toastRoot"); if(!el) return;
  el.innerHTML = state.toast ? `<div class="toast">${ICONS.check(15)} ${esc(state.toast)}</div>` : "";
}

function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card-wrap">
      <div class="brand-mark">
        <img class="logo-img" src="${LOGO_DATA_URI}" alt="Zippee" />
        <h1>Location Master</h1>
        <p>Limited access — ${esc(scopeLabel())}</p>
      </div>
      <form class="login-card" id="loginForm">
        <label class="field-label">Access code</label>
        <input class="field-input" id="loginCode" placeholder="Enter access code" style="margin-bottom:${state.authError?'6px':'16px'}" />
        ${state.authError ? `<div class="auth-error">${ICONS.alert(14)} ${esc(state.authError)}</div>` : ""}
        <button type="submit" class="login-btn">Sign in</button>
      </form>
    </div>
  </div>`;
}

function renderRow(s){
  const checked = state.selected.has(s.id);
  return `
  <div class="store-row row-grid" data-row="${s.id}">
    <button class="check-btn" data-action="toggle-row" data-id="${s.id}">${checked?ICONS.checksquare(16):ICONS.square(16)}</button>
    <div class="store-name truncate">${esc(s.storeName)}</div>
    <div>${s.brandCode?`<span class="brand-tag">${esc(s.brandCode)}</span>`:""}</div>
    <div class="col-city truncate">${esc(s.city||s.location)}</div>
    <div class="col-address truncate" title="${esc(s.address)}">${esc(s.address)}</div>
    <div>
      ${(s.pocName||s.pocPhone) ?
        `<div class="poc-name truncate">${esc(s.pocName)}</div><div class="poc-phone truncate">${esc(s.pocPhone)}</div>`
        : `<span class="dash">—</span>`}
    </div>
    <div class="row-actions">
      <button class="icon-btn" data-action="copy-one" data-id="${s.id}" title="Copy">${ICONS.copy(15)}</button>
      <button class="icon-btn" data-action="edit" data-id="${s.id}" title="Edit">${ICONS.edit(15)}</button>
    </div>
  </div>`;
}

function renderTableSection(){
  const filtered = getFiltered();
  let body;
  if(state.loading){ body = `<div class="loading-state">${ICONS.loader(20)} &nbsp;Loading stores…</div>`; }
  else if(filtered.length===0){ body = `<div class="empty-state">${ICONS.store(28)}<div>No stores in your scope match this search.</div></div>`; }
  else { body = filtered.map(renderRow).join(""); }
  return `
  <div class="table-wrap" id="tableWrap">
    <div class="row-grid table-head">
      <div></div><div>STORE NAME</div><div>BRAND</div><div class="col-city">CITY</div><div class="col-address">ADDRESS</div><div>POC</div>
      <div style="text-align:right">EDIT</div>
    </div>
    <div id="tableBody">${body}</div>
  </div>`;
}

function renderFloatBar(){
  if(state.selected.size===0) return "";
  return `<div class="float-bar" id="floatBar">
    <span style="font-size:13px;font-weight:600;">${state.selected.size} selected</span>
    <button class="float-copy" data-action="copy-selected">${ICONS.copy(14)} Copy all</button>
    <button class="float-clear" data-action="clear-selected">Clear</button>
  </div>`;
}

function renderModal(){
  if(!state.modal) return "";
  const s = state.allStores.find(x=>x.id===state.modal.id);
  if(!s) return "";
  return `
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">Edit store</div>
        <button data-action="close-modal">${ICONS.x(18)}</button>
      </div>
      <div class="grid2">
        <div class="form-field"><label>Brand code</label><input id="fBrand" value="${esc(s.brandCode)}"/></div>
        <div class="form-field"><label>Location</label><input id="fLocation" value="${esc(s.location)}"/></div>
      </div>
      <div class="grid2">
        <div class="form-field"><label>City</label><input id="fCity" value="${esc(s.city)}"/></div>
        <div class="form-field"><label>Store name</label><input id="fStoreName" value="${esc(s.storeName)}"/></div>
      </div>
      <div class="form-field"><label>Full address</label><textarea id="fAddress" rows="2">${esc(s.address)}</textarea></div>
      <div class="form-field"><label>Google Maps link</label><input id="fMaps" value="${esc(s.mapsLink)}"/></div>
      <div class="grid2">
        <div class="form-field"><label>POC name</label><input id="fPocName" value="${esc(s.pocName)}"/></div>
        <div class="form-field"><label>POC phone</label><input id="fPocPhone" value="${esc(s.pocPhone)}"/></div>
      </div>
      <div id="formErrorWrap"></div>
      <div class="modal-actions">
        <button class="btn-primary" data-action="save-form">Save changes</button>
        <button class="btn-secondary" data-action="close-modal">Cancel</button>
      </div>
    </div>
  </div>`;
}

function renderDashboard(){
  const filtered = getFiltered();
  return `
  <div class="app-header">
    <div class="header-inner">
      <div class="header-left">
        <img class="header-logo-img" src="${LOGO_DATA_URI}" alt="Zippee" />
        <div>
          <h1 class="header-title">Location Master</h1>
          <p class="header-sub">Limited access</p>
        </div>
      </div>
      <button class="signout-btn" data-action="signout">${ICONS.logout(15)} Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="scope-banner">${ICONS.pin(15)} You're viewing: ${esc(scopeLabel())} — ${filtered.length} store${filtered.length===1?"":"s"}</div>
    ${state.loadError ? `<div class="alert-bar">${ICONS.alert(16)} ${esc(state.loadError)}</div>` : ""}
    <div class="toolbar">
      <div class="search-wrap">
        <div class="icon">${ICONS.search(16)}</div>
        <input class="search-input" id="searchInput" placeholder="Search within your stores…" value="${esc(state.search)}" />
      </div>
      <button class="util-btn" data-action="export-excel">${ICONS.download(15)} Export Excel</button>
    </div>
    ${renderTableSection()}
  </div>
  <div id="floatBarRoot">${renderFloatBar()}</div>
  <div id="modalRoot">${renderModal()}</div>
  `;
}

function renderApp(){
  document.getElementById("app").innerHTML = state.authed ? renderDashboard() : renderLogin();
  if(!document.getElementById("toastRoot")){
    const t=document.createElement("div"); t.id="toastRoot"; document.body.appendChild(t);
  }
  renderToast();
}
function rerenderTableOnly(){
  const wrap=document.getElementById("tableWrap"); if(wrap) wrap.outerHTML = renderTableSection();
  const fb=document.getElementById("floatBarRoot"); if(fb) fb.innerHTML = renderFloatBar();
  const banner=document.querySelector(".scope-banner");
  if(banner) banner.innerHTML = `${ICONS.pin(15)} You're viewing: ${esc(scopeLabel())} — ${getFiltered().length} store${getFiltered().length===1?"":"s"}`;
}

function exportToExcel(){
  if(typeof XLSX==="undefined"){ flashToast("Excel library failed to load — check your connection"); return; }
  const rows = getScoped().map(s=>({
    "Store name": s.storeName||"", "Brand": s.brandCode||"", "Address": s.address||"",
    "Location": s.city||s.location||"", "Maps link": s.mapsLink||"",
    "POC name": s.pocName||"", "POC number": s.pocPhone||"",
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [{wch:26},{wch:10},{wch:46},{wch:18},{wch:40},{wch:18},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Store Master");
  XLSX.writeFile(wb, "zippee-location-master-limited.xlsx");
  flashToast(`Exported ${rows.length} stores`);
}

document.addEventListener("submit", function(e){
  if(e.target.id==="loginForm"){
    e.preventDefault();
    const code = document.getElementById("loginCode").value;
    if(code === LIMITED_ACCESS_CODE){
      state.authed=true; state.authError=""; renderApp(); loadStores();
    } else {
      state.authError = "That code doesn't match. Please check with your team lead.";
      renderApp();
    }
  }
});
document.addEventListener("input", function(e){
  if(e.target.id==="searchInput"){ state.search=e.target.value; rerenderTableOnly(); }
});
document.addEventListener("click", async function(e){
  const btn = e.target.closest("[data-action]"); if(!btn) return;
  const action = btn.getAttribute("data-action"); const id = btn.getAttribute("data-id");

  if(action==="signout"){ state.authed=false; state.selected=new Set(); renderApp(); return; }
  if(action==="toggle-row"){ state.selected.has(id)?state.selected.delete(id):state.selected.add(id); rerenderTableOnly(); return; }
  if(action==="clear-selected"){ state.selected=new Set(); rerenderTableOnly(); return; }
  if(action==="copy-one" || action==="copy-selected"){
    const ids = action==="copy-one" ? [id] : Array.from(state.selected);
    const chosen = state.allStores.filter(s=>ids.includes(s.id));
    if(chosen.length===0) return;
    try{ await navigator.clipboard.writeText(chosen.map(formatStore).join("\n\n"));
      flashToast(`Copied ${chosen.length} store${chosen.length>1?"s":""} to clipboard`);
    }catch(err){ flashToast("Couldn't access clipboard — please copy manually"); }
    return;
  }
  if(action==="export-excel"){ exportToExcel(); return; }
  if(action==="edit"){ state.modal={id}; document.getElementById("modalRoot").innerHTML = renderModal(); return; }
  if(action==="close-modal"){ state.modal=null; document.getElementById("modalRoot").innerHTML = renderModal(); return; }
  if(action==="save-form"){
    const brandCode = document.getElementById("fBrand").value.trim();
    const location = document.getElementById("fLocation").value.trim();
    const city = document.getElementById("fCity").value.trim();
    const storeName = document.getElementById("fStoreName").value.trim();
    const address = document.getElementById("fAddress").value.trim();
    const mapsLink = document.getElementById("fMaps").value.trim();
    const pocName = document.getElementById("fPocName").value.trim();
    const pocPhone = document.getElementById("fPocPhone").value.trim();
    if(!location || !address){
      document.getElementById("formErrorWrap").innerHTML = `<div class="form-error">${ICONS.alert(14)} Location and address are required.</div>`;
      return;
    }
    const record = { id: state.modal.id, brandCode, location, city: city||location, storeName, address, mapsLink, pocName, pocPhone };
    state.modal=null;
    state.allStores = state.allStores.map(s=> s.id===record.id ? record : s);
    renderApp();
    try{ await sbUpdateOne(record.id, record); flashToast("Saved"); }
    catch(err){ flashToast("Saved locally, but the update failed — check your connection"); }
    return;
  }
});

renderApp();
</script>
</body>
</html>
